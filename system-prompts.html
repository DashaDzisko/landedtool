<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Системные промпты — как структурировать промпты для AI через API</title>
<style>
  :root {
    --bg: #0f0f10;
    --surface: #1a1a1d;
    --surface-2: #232327;
    --border: #2e2e34;
    --text: #f4f4f5;
    --muted: #9ca0a8;
    --accent: #8ab4ff;
    --accent-soft: #8ab4ff22;
    --sys: #8ab4ff;
    --user: #5ee2a0;
    --assistant: #ffd479;
    --warn: #ff9d8a;
    --myth: #ff9d8a;
    --truth: #5ee2a0;
    --code-bg: #18181b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    line-height: 1.55;
  }
  .app { display: grid; grid-template-columns: 300px 1fr; height: 100vh; }
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 24px 0;
  }
  .brand { padding: 0 24px 24px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
  .brand h1 { font-size: 16px; margin: 0 0 4px; letter-spacing: -0.01em; }
  .brand p { font-size: 12px; color: var(--muted); margin: 0; }
  .lesson-list { list-style: none; padding: 0; margin: 0; }
  .lesson-item {
    padding: 10px 24px;
    cursor: pointer;
    font-size: 14px;
    color: var(--muted);
    border-left: 2px solid transparent;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.15s ease;
  }
  .lesson-item:hover { color: var(--text); background: var(--surface-2); }
  .lesson-item.active {
    color: var(--text);
    background: var(--accent-soft);
    border-left-color: var(--accent);
  }
  .lesson-num {
    font-size: 11px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    width: 20px;
  }
  .lesson-item.active .lesson-num { color: var(--accent); }

  .main { display: grid; grid-template-rows: auto 1fr auto; overflow: hidden; }
  .topbar {
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .topbar h2 { margin: 0; font-size: 18px; letter-spacing: -0.01em; }
  .topbar .progress { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .content {
    overflow-y: auto;
    padding: 32px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    align-items: start;
  }
  .lesson-text h3 { font-size: 22px; margin: 0 0 8px; letter-spacing: -0.02em; }
  .lesson-text .subtitle { color: var(--muted); margin: 0 0 20px; font-size: 14px; }
  .lesson-text p { font-size: 14px; }
  .lesson-text ul { font-size: 14px; }
  .designer-note {
    background: var(--accent-soft);
    border-left: 3px solid var(--accent);
    padding: 12px 16px;
    margin: 16px 0;
    border-radius: 6px;
    font-size: 13px;
  }
  .designer-note strong { color: var(--accent); }
  .designer-note.warn { background: #ff9d8a18; border-left-color: var(--warn); }
  .designer-note.warn strong { color: var(--warn); }
  .src {
    font-size: 11px;
    color: var(--muted);
    border-top: 1px dashed var(--border);
    margin-top: 16px;
    padding-top: 10px;
  }
  .src strong { color: var(--text); }
  code.inline {
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 12.5px;
    color: var(--accent);
  }

  /* Workspace */
  .workspace { position: sticky; top: 0; display: flex; flex-direction: column; gap: 12px; }
  .panel-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    min-height: 380px;
  }

  /* Code / preview */
  pre.code {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 12px;
    line-height: 1.6;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text);
    margin: 0;
  }
  .tok-key { color: var(--sys); }
  .tok-str { color: var(--user); }
  .tok-role { color: var(--assistant); font-weight: 600; }
  .tok-com { color: var(--muted); font-style: italic; }

  /* Rows + choice buttons (roles & myth quiz) */
  .msg-row {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
    background: var(--surface-2);
    font-size: 13px;
  }
  .msg-row p { margin: 0 0 10px; }
  .role-btns { display: flex; gap: 6px; }
  .role-btn {
    flex: 1;
    background: var(--code-bg);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 5px;
    padding: 5px 0;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
  }
  .role-btn:hover { border-color: var(--muted); }
  .role-btn.correct { background: var(--truth); color: #062818; border-color: var(--truth); font-weight: 700; }
  .role-btn.wrong { background: var(--warn); color: #2a0d06; border-color: var(--warn); font-weight: 700; }
  .verdict { font-size: 11.5px; color: var(--muted); margin-top: 8px; display: none; line-height: 1.5; }
  .verdict.show { display: block; }
  .role-pill {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .pill-sys { background: var(--sys); color: #061a33; }
  .pill-user { background: var(--user); color: #062818; }
  .pill-assistant { background: var(--assistant); color: #2e2300; }

  /* Compare cards (myth) */
  .compare { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .cmp-card { border-radius: 8px; padding: 12px; font-size: 12px; border: 1px solid var(--border); }
  .cmp-card.bad { background: #ff9d8a12; border-color: #ff9d8a55; }
  .cmp-card.good { background: #5ee2a012; border-color: #5ee2a055; }
  .cmp-card h5 { margin: 0 0 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
  .cmp-card.bad h5 { color: var(--myth); }
  .cmp-card.good h5 { color: var(--truth); }
  .cmp-card code { font-family: "SF Mono", Menlo, monospace; font-size: 11px; color: var(--text); }

  /* Stat chips */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 6px; }
  .stat {
    background: var(--code-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px;
  }
  .stat .big { font-size: 18px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }
  .stat .cap { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.4; }

  /* Worksheet inputs */
  textarea.sheet, input.sheet {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    width: 100%;
    outline: none;
    resize: vertical;
  }
  textarea.sheet { min-height: 56px; line-height: 1.5; }
  textarea.sheet:focus, input.sheet:focus { border-color: var(--accent); }
  .sheet-block { margin-bottom: 14px; }
  .sheet-label {
    font-size: 12px;
    color: var(--text);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sheet-label .tag {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--accent);
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 4px;
  }
  .sheet-hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    font-style: italic;
  }
  .saved-indicator {
    font-size: 11px;
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .saved-indicator.show { opacity: 1; }

  /* Sliders */
  .slider-block { margin-bottom: 22px; }
  .slider-block label { font-size: 13px; display: flex; justify-content: space-between; margin-bottom: 8px; }
  .slider-block .val { color: var(--accent); font-variant-numeric: tabular-nums; font-weight: 700; }
  input[type="range"] { width: 100%; accent-color: var(--accent); }
  .slider-feedback { font-size: 12px; color: var(--muted); margin-top: 8px; min-height: 32px; }

  /* Checklist */
  .check-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .check-item:last-child { border-bottom: none; }
  .check-item input[type="checkbox"] {
    margin-top: 3px;
    accent-color: var(--accent);
    width: 16px;
    height: 16px;
  }
  .check-item label { flex: 1; cursor: pointer; }
  .check-item .hint { display: block; font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* Bottom nav */
  .bottombar {
    padding: 16px 32px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }
  .btn {
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 10px 20px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s ease;
  }
  .btn:hover:not(:disabled) { border-color: var(--muted); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #061a33;
    font-weight: 700;
  }
  .btn.primary:hover:not(:disabled) { background: #a9c8ff; border-color: #a9c8ff; }

  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .content { grid-template-columns: 1fr; }
    .compare { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <h1>Системные промпты для AI</h1>
      <p>Как структурировать промпт и отправить его через API. На основе исследований 2024–2026.</p>
    </div>
    <ul class="lesson-list" id="lessonList"></ul>
  </aside>

  <main class="main">
    <header class="topbar">
      <h2 id="topTitle">—</h2>
      <span class="progress" id="progress">0 / 0</span>
    </header>

    <section class="content">
      <div class="lesson-text" id="lessonText"></div>
      <div class="workspace" id="workspace"></div>
    </section>

    <footer class="bottombar">
      <button class="btn" id="prevBtn">← Назад</button>
      <button class="btn primary" id="nextBtn">Далее →</button>
    </footer>
  </main>
</div>

<script>
// ─── Persistent state ────────────────────────────────────────────────────
const STORAGE_KEY = "sysprompt_workbook_v1";
const work = (() => {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
})();
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(work)); } catch {}
  document.querySelectorAll(".saved-indicator").forEach(el => {
    el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), 800);
  });
}
function esc(s) {
  return (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// ─── Prompt-builder fields (shared across lessons) ─────────────────────────
const BUILDER_FIELDS = [
  { key: "role",        tag: "Роль",        label: "Кто ты для модели (тон и формат, НЕ знания)",
    ph: "Ты — внимательный ассистент поддержки SaaS для нетехнических пользователей. Тон — спокойный, без жаргона.",
    hint: "Профессия + аудитория + тон. Задаёт стиль и фокус, а не «прокачивает» точность." },
  { key: "context",     tag: "Контекст",    label: "Что модель должна знать",
    ph: "Продукт — приложение для учёта финансов. Сегодня 15 июня 2026. Тарифы: Free, Pro (€9/мес).",
    hint: "Факты, данные, ограничения. ЗНАНИЯ дают здесь — не через «20 лет опыта»." },
  { key: "instructions", tag: "Задача",     label: "Что нужно сделать",
    ph: "Ответь на вопрос. Если данных не хватает — задай один уточняющий вопрос, а не угадывай.",
    hint: "Шаги по порядку. Формулируй позитивно: «делай X», а не только «не делай Y»." },
  { key: "examples",    tag: "Примеры",     label: "1–3 примера «вход → ответ» (few-shot)",
    ph: "Вопрос: «Как сменить тариф?» → Ответ: «Откройте Профиль → Подписка → Сменить план.»",
    hint: "Самый надёжный рычаг качества и формата. Можно и в system, и в messages." },
  { key: "format",      tag: "Формат",      label: "Как должен выглядеть ответ",
    ph: "Краткий абзац + до 3 пунктов. Без markdown-заголовков. На русском.",
    hint: "Длина, язык, структура. Нужен JSON — опиши схему явно." },
  { key: "constraints", tag: "Границы",     label: "Чего делать нельзя",
    ph: "Не давай юридических советов. Не выдумывай тарифы. Если запрос вне темы — вежливо откажись.",
    hint: "Запреты и поведение в крайних случаях." },
];

function renderBuilderForm() {
  return BUILDER_FIELDS.map(f => `
    <div class="sheet-block">
      <span class="sheet-label"><span class="tag">${f.tag}</span> ${f.label}</span>
      <textarea class="sheet builder-field" data-key="${f.key}" placeholder="${esc(f.ph)}"></textarea>
      <div class="sheet-hint">${f.hint}</div>
    </div>
  `).join("");
}
function bindBuilderForm() {
  work.builder = work.builder || {};
  document.querySelectorAll(".builder-field").forEach(t => {
    const k = t.dataset.key;
    t.value = work.builder[k] || "";
    t.addEventListener("input", () => { work.builder[k] = t.value; save(); });
  });
}
function assembleSystemPrompt() {
  const b = work.builder || {};
  const parts = [];
  if (b.role)         parts.push(b.role.trim());
  if (b.context)      parts.push("# Контекст\n" + b.context.trim());
  if (b.instructions) parts.push("# Задача\n" + b.instructions.trim());
  if (b.examples)     parts.push("# Примеры\n" + b.examples.trim());
  if (b.format)       parts.push("# Формат ответа\n" + b.format.trim());
  if (b.constraints)  parts.push("# Ограничения\n" + b.constraints.trim());
  return parts.join("\n\n");
}

// generic Миф/Правда + correct-role quiz wiring
function wireChoiceQuiz() {
  document.querySelectorAll(".role-btns").forEach(group => {
    const correct = group.dataset.correct;
    const verdict = group.parentElement.querySelector(".verdict");
    group.querySelectorAll(".role-btn").forEach(btn => {
      btn.onclick = () => {
        group.querySelectorAll(".role-btn").forEach(b => b.classList.remove("correct", "wrong"));
        const ok = btn.dataset.role === correct;
        btn.classList.add(ok ? "correct" : "wrong");
        if (verdict) verdict.classList.add("show");
      };
    });
  });
}

// ─── Lessons ───────────────────────────────────────────────────────────────
const lessons = [

  // 1 — INTRO
  {
    title: "Что такое системный промпт",
    subtitle: "",
    body: () => `
      <p><strong>Системный промпт</strong> — инструкция, которую вы даёте модели <em>до</em> того, как пользователь напишет хоть слово. Он задаёт роль, правила и формат ответа на весь диалог.</p>
      <p>Через <strong>API</strong> (а не чат-интерфейс) вы отправляете обычный HTTP-запрос с JSON. В нём системный промпт — отдельное поле, а реплики пользователя и модели лежат в массиве сообщений.</p>
      <div class="designer-note">
        <strong>Главный вывод курса (по исследованиям 2024–2026):</strong> системный промпт сильно влияет на <em>тон, формат и поведение</em> — но почти не «прокачивает» точность. Реальные рычаги точности — конкретика, примеры, формат и рассуждение по шагам. А раздутые роли вроде «эксперт с 9309 годами опыта» <em>не помогают и часто вредят</em> (урок 4).
      </div>
      <p>Справа — рабочая тетрадь. Всё сохраняется в браузере. К уроку 14 вы соберёте готовый промпт и увидите реальный API-запрос.</p>
    `,
    workspace: () => `
      <div class="panel-label">Поток: от чата к API</div>
      <div class="panel">
        <p style="font-size:13px;color:var(--muted);margin:0 0 16px;">Что происходит, когда вы пишете модели:</p>
        <pre class="code"><span class="tok-com"># 1. Вы задаёте поведение один раз</span>
<span class="tok-key">system</span>: <span class="tok-str">"Ты — ассистент поддержки..."</span>

<span class="tok-com"># 2. Диалог — это массив сообщений</span>
<span class="tok-key">messages</span>: [
  { <span class="tok-role">user</span>:      <span class="tok-str">"У меня не приходит чек"</span> },
  { <span class="tok-role">assistant</span>: <span class="tok-str">"Проверьте папку Спам..."</span> },
  { <span class="tok-role">user</span>:      <span class="tok-str">"Там пусто"</span> }
]

<span class="tok-com"># 3. Параметры управляют генерацией</span>
<span class="tok-key">model</span>:       <span class="tok-str">"claude-opus-4-8"</span>
<span class="tok-key">max_tokens</span>:  1024
<span class="tok-key">temperature</span>: 0.7</pre>
        <div style="border-top:1px solid var(--border);padding-top:14px;margin-top:16px;font-size:12px;color:var(--muted);">
          <strong>К уроку 14</strong> вы разберёте каждую строчку и соберёте свою.
        </div>
      </div>
    `,
  },

  // 2 — ANATOMY
  {
    title: "Анатомия API-запроса",
    subtitle: "Из чего состоит вызов модели.",
    body: () => `
      <p>Любой запрос к модели — JSON-объект с несколькими полями. Разберём ключевые на примере <strong>Anthropic Messages API</strong>.</p>
      <ul>
        <li><code class="inline">model</code> — какую модель вызвать.</li>
        <li><code class="inline">system</code> — <strong>системный промпт</strong>. Отдельное поле, не часть диалога.</li>
        <li><code class="inline">messages</code> — массив реплик с ролями <code class="inline">user</code> / <code class="inline">assistant</code>.</li>
        <li><code class="inline">max_tokens</code> — потолок длины ответа.</li>
        <li><code class="inline">temperature</code> — степень «творческости» (урок 13).</li>
      </ul>
      <div class="designer-note">
        <strong>Важно:</strong> системный промпт живёт в <code class="inline">system</code>, а не внутри <code class="inline">messages</code>. Модель воспринимает его как рамку для всего разговора.
      </div>
    `,
    workspace: () => `
      <div class="panel-label">Реальный запрос (Python SDK)</div>
      <div class="panel">
        <pre class="code"><span class="tok-key">import</span> anthropic

client = anthropic.Anthropic()

msg = client.messages.create(
    <span class="tok-key">model</span>=<span class="tok-str">"claude-opus-4-8"</span>,
    <span class="tok-key">max_tokens</span>=1024,
    <span class="tok-key">temperature</span>=0.7,
    <span class="tok-key">system</span>=<span class="tok-str">"Ты — ассистент поддержки. "</span>
           <span class="tok-str">"Отвечай кратко и по-русски."</span>,
    <span class="tok-key">messages</span>=[
        {<span class="tok-key">"role"</span>: <span class="tok-role">"user"</span>,
         <span class="tok-key">"content"</span>: <span class="tok-str">"Как сменить тариф?"</span>}
    ]
)

print(msg.content[0].text)</pre>
        <div style="border-top:1px solid var(--border);padding-top:14px;margin-top:16px;font-size:12px;color:var(--muted);">
          Всё, что зашьёте в <code class="inline">system</code>, применится ко <em>всем</em> сообщениям диалога.
        </div>
      </div>
    `,
  },

  // 3 — ROLES
  {
    title: "Роли: system / user / assistant",

// ─── Rendering ───────────────────────────────────────────────────────────
const lessonListEl = document.getElementById("lessonList");
const lessonTextEl = document.getElementById("lessonText");
const workspaceEl = document.getElementById("workspace");
const topTitle = document.getElementById("topTitle");
const progress = document.getElementById("progress");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

let currentIdx = 0;

function buildSidebar() {
  lessonListEl.innerHTML = "";
  lessons.forEach((l, i) => {
    const li = document.createElement("li");
    li.className = "lesson-item" + (i === currentIdx ? " active" : "") + (i < currentIdx ? " done" : "");
    li.innerHTML = `<span class="lesson-num">${String(i + 1).padStart(2, "0")}</span><span>${l.title}</span>`;
    li.onclick = () => loadLesson(i);
    lessonListEl.appendChild(li);
  });
}

function loadLesson(i) {
  currentIdx = i;
  const l = lessons[currentIdx];
  topTitle.textContent = l.title;
  progress.textContent = `${currentIdx + 1} / ${lessons.length}`;
  lessonTextEl.innerHTML = `
    <h3>${l.title}</h3>
    ${l.subtitle ? `<p class="subtitle">${l.subtitle}</p>` : ""}
    ${l.body()}
  `;
  workspaceEl.innerHTML = l.workspace();
  if (l.init) l.init();
  buildSidebar();
  prevBtn.disabled = currentIdx === 0;
  nextBtn.disabled = currentIdx === lessons.length - 1;
  try { localStorage.setItem("sysprompt_lesson", currentIdx); } catch {}
}

prevBtn.onclick = () => currentIdx > 0 && loadLesson(currentIdx - 1);
nextBtn.onclick = () => currentIdx < lessons.length - 1 && loadLesson(currentIdx + 1);

document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "TEXTAREA" || e.target.tagName === "INPUT") return;
  if (e.key === "ArrowRight" && !nextBtn.disabled) nextBtn.click();
  if (e.key === "ArrowLeft" && !prevBtn.disabled) prevBtn.click();
});

let saved = 0;
try { saved = parseInt(localStorage.getItem("sysprompt_lesson")) || 0; } catch {}
loadLesson(Math.min(saved, lessons.length - 1));
</script>
</body>
</html>
