<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Карьерный рычаг: собранный продукт как магнит для собесов</title>
<style>
  :root {
    --bg: #0f0f10;
    --surface: #1a1a1d;
    --surface-2: #232327;
    --border: #2e2e34;
    --text: #f4f4f5;
    --muted: #9ca0a8;
    --accent: #ffb47e;
    --accent-soft: #ffb47e22;
    --accent-dark: #2a1808;
    --object: #ffb47e;
    --attr: #c5b4ff;
    --cta: #5ee2a0;
    --content: #ffd479;
    --code-bg: #18181b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    line-height: 1.55;
  }
  .app { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 24px 0;
  }
  .brand { padding: 0 24px 24px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
  .brand h1 { font-size: 16px; margin: 0 0 4px; letter-spacing: -0.01em; }
  .brand p { font-size: 12px; color: var(--muted); margin: 0; }
  .lesson-list { list-style: none; padding: 0; margin: 0; }
  .lesson-item {
    padding: 10px 24px;
    cursor: pointer;
    font-size: 14px;
    color: var(--muted);
    border-left: 2px solid transparent;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.15s ease;
  }
  .lesson-item:hover { color: var(--text); background: var(--surface-2); }
  .lesson-item.active {
    color: var(--text);
    background: var(--accent-soft);
    border-left-color: var(--accent);
  }
  .lesson-num {
    font-size: 11px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    width: 20px;
  }
  .lesson-item.active .lesson-num { color: var(--accent); }

  .main { display: grid; grid-template-rows: auto 1fr auto; overflow: hidden; }
  .topbar {
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .topbar h2 { margin: 0; font-size: 18px; letter-spacing: -0.01em; }
  .topbar .progress { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .content {
    overflow-y: auto;
    padding: 32px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    align-items: start;
  }
  .lesson-text h3 { font-size: 22px; margin: 0 0 8px; letter-spacing: -0.02em; }
  .lesson-text .subtitle { color: var(--muted); margin: 0 0 20px; font-size: 14px; }
  .lesson-text p { font-size: 14px; }
  .lesson-text ul, .lesson-text ol { font-size: 14px; padding-left: 20px; }
  .lesson-text li { margin-bottom: 6px; }
  .designer-note {
    background: var(--accent-soft);
    border-left: 3px solid var(--accent);
    padding: 12px 16px;
    margin: 16px 0;
    border-radius: 6px;
    font-size: 13px;
  }
  .designer-note strong { color: var(--accent); }
  code.inline {
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 12.5px;
    color: var(--accent);
  }
  .quote-block {
    border-left: 3px solid var(--border);
    padding: 8px 14px;
    margin: 12px 0;
    font-style: italic;
    color: var(--muted);
    font-size: 13px;
  }

  .workspace { position: sticky; top: 0; display: flex; flex-direction: column; gap: 12px; }
  .panel-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .panel-label button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 10px;
    font-size: 11px;
    border-radius: 4px;
    cursor: pointer;
    text-transform: none;
    letter-spacing: 0;
  }
  .panel-label button:hover { color: var(--text); border-color: var(--muted); }
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    min-height: 380px;
  }

  textarea.sheet, input.sheet {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    width: 100%;
    outline: none;
    resize: vertical;
  }
  textarea.sheet { min-height: 70px; line-height: 1.5; }
  textarea.sheet:focus, input.sheet:focus { border-color: var(--accent); }
  .sheet-block { margin-bottom: 14px; }
  .sheet-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    display: block;
  }
  .sheet-hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    font-style: italic;
  }
  .saved-indicator {
    font-size: 11px;
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .saved-indicator.show { opacity: 1; }

  .preview-box {
    background: var(--accent-soft);
    border: 1px dashed var(--accent);
    border-radius: 8px;
    padding: 14px 16px;
    margin-top: 14px;
    font-size: 13px;
    line-height: 1.6;
    min-height: 60px;
    color: var(--text);
  }
  .preview-box .placeholder { color: var(--muted); font-style: italic; }
  .preview-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .choice-card {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.15s ease;
    background: var(--surface-2);
  }
  .choice-card:hover { border-color: var(--muted); }
  .choice-card.selected {
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .choice-card h5 {
    margin: 0 0 6px;
    font-size: 13px;
    color: var(--accent);
  }
  .choice-card p {
    margin: 0;
    font-size: 12.5px;
    color: var(--muted);
    line-height: 1.5;
  }
  .choice-card.selected p { color: var(--text); }

  .check-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .check-item:last-child { border-bottom: none; }
  .check-item input[type="checkbox"] {
    margin-top: 3px;
    accent-color: var(--accent);
    width: 16px;
    height: 16px;
  }
  .check-item label { flex: 1; cursor: pointer; }
  .check-item .hint { display: block; font-size: 11px; color: var(--muted); margin-top: 2px; }

  .compare-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 12px 0;
  }
  .compare-cell {
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 12.5px;
  }
  .compare-cell.bad {
    background: #2a1818;
    color: #ff9d8a;
    border: 1px solid #4a2828;
  }
  .compare-cell.good {
    background: #182a1f;
    color: #5ee2a0;
    border: 1px solid #2a4a38;
  }

  .bottombar {
    padding: 16px 32px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }
  .btn {
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 10px 20px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s ease;
  }
  .btn:hover:not(:disabled) { border-color: var(--muted); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--accent-dark);
    font-weight: 700;
  }
  .btn.primary:hover:not(:disabled) { background: #ffc99a; border-color: #ffc99a; }

  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .content { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <h1>Карьерный рычаг</h1>
      <p>Как превратить собранный продукт в магнит для собесов.</p>
    </div>
    <ul class="lesson-list" id="lessonList"></ul>
  </aside>

  <main class="main">
    <header class="topbar">
      <h2 id="topTitle">-</h2>
      <span class="progress" id="progress">0 / 0</span>
    </header>

    <section class="content">
      <div class="lesson-text" id="lessonText"></div>
      <div class="workspace" id="workspace"></div>
    </section>

    <footer class="bottombar">
      <button class="btn" id="prevBtn">← Назад</button>
      <button class="btn primary" id="nextBtn">Далее →</button>
    </footer>
  </main>
</div>

<script>
const STORAGE_KEY = "career_leverage_workbook_v1";
const work = (() => {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
})();
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(work)); } catch {}
  document.querySelectorAll(".saved-indicator").forEach(el => {
    el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), 800);
  });
}
function bindInput(el, key) {
  el.value = work[key] || "";
  el.addEventListener("input", () => { work[key] = el.value; save(); });
}
function escape(s) {
  return (s || "").replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

const lessons = [
  // 1. WHY PACKAGE AT ALL
  {
    title: "Зачем упаковывать",
    subtitle: "Сборка - только часть работы.",
    body: () => `
      <p>Вы только что закончили сборку продукта. Кажется, что дальше можно выдохнуть: код работает, фичи на месте. Тут обычно и теряется самая полезная часть работы.</p>
      <p>Готовый продукт сам по себе мало что меняет в карьере. Поменять может то, что он способен открыть: помочь попасть на собес, привести клиента, начать разговор, который без него не случился бы.</p>
      <p>Чтобы это сработало, продукт надо <strong>упаковать</strong>: сделать так, чтобы кто-то посторонний за пару минут понял, что вы сделали, зачем и почему это интересно. Без этого даже хороший проект остается невидимым.</p>
      <div class="designer-note">
        Многие пет-проекты остаются незамеченными не из-за качества. Просто про них никто не узнает. Готовый код и живая ссылка, которую никто не открыл, по результату дают примерно одинаковое.
      </div>
      <p>Поэтому модуль не про новые фичи. Он про то, как уже сделанное становится видимым: в резюме, в кейсе на портфолио, в LinkedIn, в переписке с рекрутером, на собесе.</p>
      <p>Сразу оговоримся: Landed вряд ли превратится в бизнес. Трекеры подач - переполненная ниша (Teal, Huntr, Simplify), люди за такое почти не платят. Но навык упаковки переносится почти куда угодно: на следующий пет-проект, на рабочий кейс, на тестовое задание.</p>
    `,
    workspace: () => `
      <div class="panel-label">Что внутри модуля</div>
      <div class="panel">
        <h3 style="margin:0 0 12px;font-size:18px;">Карьерный рычаг</h3>
        <p style="font-size:13px;color:var(--muted);margin:0 0 16px;">Модуль занятия для курса Vibe Coding for Web Designers. Разбираем на примере <strong style="color:var(--text);">Landed - AI Job Application Tracker</strong>, но подход подходит для любого собранного продукта.</p>
        <div style="border-top:1px solid var(--border);padding-top:16px;">
          <div class="panel-label" style="margin-bottom:8px;">Три блока</div>
          <ul style="font-size:13px;margin:0;padding-left:20px;color:var(--muted);">
            <li><strong style="color:var(--text);">Упаковать</strong> - Landed как портфольный кейс</li>
            <li><strong style="color:var(--text);">Рассказать</strong> - история на собесе</li>
            <li><strong style="color:var(--text);">Учесть</strong> - типичные ошибки</li>
          </ul>
        </div>
        <div style="border-top:1px solid var(--border);padding-top:16px;margin-top:16px;font-size:12px;color:var(--muted);">
          <strong>К концу модуля у вас будет:</strong> наброски origin story, одна строка для резюме, скелет кейса, текст 60-секундного питча и план на ближайшую неделю.
        </div>
      </div>
    `,
  },

  // 2. WHAT HIRING MANAGERS EVALUATE
  {
    title: "Что оценивает hiring manager",
    subtitle: "На что обычно смотрят в пет-проекте.",
    body: () => `
      <p>Когда hiring manager открывает ваш пет-проект, его обычно интересуют не код и не визуал. Скорее всего, он считывает три вещи:</p>
      <ol>
        <li><strong>Почему вы это сделали.</strong> Если ответ звучит как «я сам(а) сталкивался(ась) с этой проблемой, и существующие решения мне не подошли», это сразу заметно. Видно драйв и то, что технические решения принимались осознанно: у автора было что-то на кону. У таких проектов обычно и документация толковее, потому что автору было важно.</li>
        <li><strong>Где оно живет.</strong> Между «у меня все работает локально» и «вот ссылка, заходите» большая разница. Даже один сторонний пользователь меняет восприятие: значит, продукт дотянули до состояния, в котором его не страшно показать.</li>
        <li><strong>Что именно вы решали.</strong> Вместо «вот скрины приложения» интереснее связка: была вот такая проблема, попробовал(а) такое решение, вот что из этого получилось.</li>
      </ol>
      <div class="designer-note">
        Попробуйте прямо сейчас ответить на три вопроса справа. Если на какой-то из них ответа пока нет, имеет смысл сначала закрыть эту дыру, а потом думать про новые фичи.
      </div>
    `,
    workspace: () => `
      <div class="panel-label"><span>Проверьте свой проект</span><span class="saved-indicator">сохранено</span></div>
      <div class="panel">
        <div class="sheet-block">
          <label class="sheet-label">1. Почему вы это сделали (2 предложения, личная история)</label>
          <textarea class="sheet" id="origin_story" rows="3" placeholder="Я постоянно подавалась на вакансии и теряла нить: кто ответил, где отказ. Готовые трекеры заставляли все вбивать руками."></textarea>
        </div>
        <div class="sheet-block">
          <label class="sheet-label">2. Живой URL продукта</label>
          <input class="sheet" id="live_url" placeholder="https://...">
          <div class="sheet-hint">Если ссылки пока нет, стоит начать именно с этого.</div>
        </div>
        <div class="sheet-block">
          <label class="sheet-label">3. Что вы решали (одна фраза: проблема → решение → результат)</label>
          <textarea class="sheet" id="what_solved" rows="3" placeholder="Подключила почту, чтобы трекер сам логировал отказы и приглашения."></textarea>
        </div>
      </div>
    `,
    init: () => {
      bindInput(document.getElementById("origin_story"), "origin_story");
      bindInput(document.getElementById("live_url"), "live_url");
      bindInput(document.getElementById("what_solved"), "what_solved");
    },
  },

  // 3. CASE SKELETON
  {
    title: "Скелет кейса",
    subtitle: "Из каких блоков обычно собирают кейс.",
    body: () => `
      <p>Хорошо работает такая структура:</p>
      <ol>
        <li><strong>Хук</strong> (1 экран) - одна строка про то, что это и зачем. Лучше описание, чем просто название.</li>
        <li><strong>Проблема</strong> - личная история. Почему существующие решения не подошли.</li>
        <li><strong>Роль и рамки</strong> - что вы делали сами, за какое время, какой стек.</li>
        <li><strong>Ключевые решения</strong> - 2-3 развилки, где приходилось выбирать, и логика выбора.</li>
        <li><strong>Что показать вживую</strong> - кликабельный продукт или короткое видео-прохождение.</li>
        <li><strong>Что не сделали</strong> - что осознанно выкинули и что хотелось бы доделать.</li>
        <li><strong>Вывод</strong> - что вы узнали, что поменялось, какая-нибудь метрика, если есть.</li>
      </ol>
      <div class="designer-note">
        Про хук стоит остановиться отдельно: описание обычно работает заметно лучше, чем одно название. Для примера:
        <div class="compare-row">
          <div class="compare-cell bad">«Landed» / «Job Tracker»</div>
          <div class="compare-cell good">«AI-трекер подач, который сам читает почту и логирует отказы и приглашения. Собран за 8 недель на Next.js + OpenAI»</div>
        </div>
        Вторая версия читается за несколько секунд и людьми, и AI-скринерами, через которые сейчас проходит большая часть портфолио до того, как до них доберется живой рекрутер.
      </div>
    `,
    workspace: () => `
      <div class="panel-label"><span>Заполните скелет</span><span class="saved-indicator">сохранено</span></div>
      <div class="panel">
        <div class="sheet-block">
          <label class="sheet-label">Хук (одна строка)</label>
          <input class="sheet" id="case_hook" placeholder="AI-трекер подач, который сам читает почту...">
        </div>
        <div class="sheet-block">
          <label class="sheet-label">Проблема (личная боль)</label>
          <textarea class="sheet" id="case_problem" rows="2"></textarea>
        </div>
        <div class="sheet-block">
          <label class="sheet-label">Роль, время, стек</label>
          <input class="sheet" id="case_role" placeholder="дизайнер, 8 недель, Next.js + OpenAI + Supabase">
        </div>
        <div class="sheet-block">
          <label class="sheet-label">2-3 ключевых решения и почему</label>
          <textarea class="sheet" id="case_decisions" rows="3" placeholder="– AI для парсинга описаний (Structured Outputs)&#10;– Статусы держу детерминированно&#10;– Без авторизации в MVP"></textarea>
        </div>
        <div class="sheet-block">
          <label class="sheet-label">Что НЕ сделал(а) и почему (это сила)</label>
          <textarea class="sheet" id="case_cut" rows="2"></textarea>
        </div>
        <div class="sheet-block">
          <label class="sheet-label">Вывод / метрика</label>
          <textarea class="sheet" id="case_result" rows="2"></textarea>
        </div>
      </div>
    `,
    init: () => {
      ["case_hook","case_problem","case_role","case_decisions","case_cut","case_result"].forEach(k => {
        bindInput(document.getElementById(k), k);
      });
    },
  },

  // 4. AI CONFIDENCE
  {
    title: "Уверенная работа с AI",
    subtitle: "Где показать опыт работы с моделями.",
    body: () => `
      <p>Фраза «я использовал(а) ChatGPT» сама по себе мало что говорит. Лучше работают конкретные решения:</p>
      <ul>
        <li>Где вы оставили детерминированный код, а где доверились модели (например, Structured Outputs против хардкода).</li>
        <li>Где вы намеренно не использовали AI и почему. Это часто рассказывает о подходе больше, чем сами use-кейсы.</li>
        <li>Как vibe coding позволил вам как дизайнеру самостоятельно собрать фронтенд. Такая комбинация навыков сейчас особенно ценится в командах.</li>
      </ul>
      <div class="designer-note">
        Удобная формула одной строки для резюме или LinkedIn:<br>
        <code class="inline">Глагол + задеплоено + что делает + цифра</code><br>
        Цифра может быть скромной (например, «12 человек»), главное - чтобы она была настоящей.
      </div>

      <p>Когда хочется понять, нащупали ли вы хоть какой-то product-market fit, есть два простых опросника, которые можно прогнать даже на маленькой выборке.</p>
      <p><strong>Тест Шона Эллиса (правило 40%).</strong> Один вопрос: «Что бы вы почувствовали, если бы больше не могли пользоваться продуктом?» Варианты ответа: очень расстроюсь / немного расстроюсь / не расстроюсь. Если 40% и больше ответили «очень расстроюсь», обычно говорят про PMF. Меньше - продукт пока не стал необходимым.</p>
      <p>Шон Эллис (первый маркетолог Dropbox, автор термина growth hacking) вывел этот порог, сравнив сотни стартапов: те, кто набирал 40%+, дальше росли устойчиво. Важный нюанс: считаются только «очень расстроюсь», «немного» сюда не идет.</p>
      <p>На собесе: «Я провела тест Эллиса на 10 пользователях, 5 сказали «очень расстроюсь». Выборка маленькая, но направление понятно - продукт закрывает реальную боль».</p>
      <p><strong>NPS (Net Promoter Score).</strong> Один вопрос: «Насколько вероятно, что вы порекомендуете продукт другу или коллеге?» Шкала от 0 до 10.</p>
      <ul>
        <li>9-10 - промоутеры</li>
        <li>7-8 - пассивные</li>
        <li>0-6 - критики</li>
      </ul>
      <p>NPS = % промоутеров − % критиков. Диапазон от −100 до +100. Ориентиры: выше 0 - нормально, выше 30 - хорошо, выше 50 - отлично.</p>

    body: () => `

      </ul>
      <p><strong>OMTM (One Metric That Matters)</strong> - идея из книги Алистера Кролла и Бена Йосковица «Lean Analytics». В каждый момент у продукта есть одна метрика, на которой стоит фокусироваться, и она меняется со стадией:</p>
      <ul>

        <li><strong>Стикинесс</strong> (есть продукт, проверяете, цепляет ли) - retention, частота возвращений</li>
        <li><strong>Виральность</strong> (цепляет, проверяете, рассказывают ли) - органические рефералы</li>
        <li><strong>Выручка</strong> (рассказывают, проверяете, платят ли) - конверсия в оплату, ARPU</li>
        <li><strong>Масштаб</strong> (платят, теперь растете) - CAC, LTV, unit economics</li>
      </ul>
      <p>Для пет-проекта чаще всего актуальна стадия «стикинесс». Тогда OMTM - retention. Считать виральность или выручку, пока непонятно, возвращаются ли люди, обычно преждевременно.</p>
      <div class="designer-note">
        На собесе ответ «NSM моего продукта - количество залогированных подач в неделю, потому что это действие, ради которого приходят» звучит сильнее, чем «количество пользователей». Если добавить стадию: «сейчас фокусируюсь на retention, пока 53%», получается уже зрелый продуктовый ответ.
      </div>
    `,
    workspace: () => {
      const stages = [
        { key: "empathy", label: "Эмпатия", hint: "Исследуете идею. OMTM: интервью, паттерны." },
        { key: "sticky", label: "Стикинесс", hint: "Есть продукт. OMTM: retention." },
        { key: "viral", label: "Виральность", hint: "Цепляет. OMTM: органические рефералы." },
        { key: "revenue", label: "Выручка", hint: "Рассказывают. OMTM: конверсия в оплату." },
        { key: "scale", label: "Масштаб", hint: "Платят. OMTM: CAC, LTV." },
      ];
      const selected = work.omtm_stage || "";
      return `
        <div class="panel-label"><span>Ваша главная метрика</span><span class="saved-indicator">сохранено</span></div>
        <div class="panel">
          <div class="sheet-block">
            <label class="sheet-label">North Star Metric (одна фраза)</label>
            <input class="sheet" id="nsm_text" placeholder="Количество залогированных подач в неделю">
          </div>
          <div class="sheet-block">
            <label class="sheet-label">Стадия проекта</label>
            ${stages.map(s => `
              <div class="choice-card ${selected === s.key ? "selected" : ""}" data-key="${s.key}" style="padding:10px 12px;margin-bottom:6px;">
                <h5 style="margin:0 0 2px;font-size:12px;">${s.label}</h5>
                <p style="font-size:11.5px;">${s.hint}</p>
              </div>
            `).join("")}
          </div>
          <div class="sheet-block">
            <label class="sheet-label">Что сейчас мерите по этой стадии</label>
            <input class="sheet" id="omtm_text" placeholder="Retention на второй неделе - 53%">
          </div>
        </div>
      `;
    },
    init: () => {
      bindInput(document.getElementById("nsm_text"), "nsm_text");
      bindInput(document.getElementById("omtm_text"), "omtm_text");
      document.querySelectorAll(".choice-card").forEach(card => {
        card.onclick = () => {
          work.omtm_stage = card.dataset.key;
          document.querySelectorAll(".choice-card").forEach(c => c.classList.remove("selected"));
          card.classList.add("selected");
          save();
        };
      });
    },
  },

  // 17. RICE + JTBD
  {
    title: "Приоритизация и задача продукта",
    subtitle: "RICE для выбора фич и JTBD для формулировки работы.",
    body: () => `
      <p>Когда идей больше, чем времени, помогает простой счет. <strong>RICE</strong> - фреймворк приоритизации фич от Intercom. Четыре параметра:</p>
      <ul>
        <li><strong>Reach</strong> - скольких пользователей затронет за период (например, за месяц)</li>
        <li><strong>Impact</strong> - насколько сильно повлияет (шкала: 0.25 / 0.5 / 1 / 2 / 3)</li>
        <li><strong>Confidence</strong> - насколько вы уверены в оценках (%)</li>
        <li><strong>Effort</strong> - сколько усилий нужно (в человеко-неделях)</li>
      </ul>
      <p>Формула: <code class="inline">(Reach × Impact × Confidence) / Effort = RICE-скор</code>.</p>
      <p>Например, для Landed две конкурирующие фичи могли дать:</p>
      <ul>
        <li>Авто-лог из почты: Reach 15, Impact 3, Confidence 60%, Effort 3 нед. RICE = 9.0.</li>
        <li>Темная тема: Reach 15, Impact 0.5, Confidence 90%, Effort 0.5 нед. RICE = 13.5.</li>
      </ul>
      <p>Темная тема выигрывает по скору (меньше усилий), но авто-лог сильнее по импакту. Обсуждение такого компромисса на собесе обычно звучит зрело.</p>
      <p><strong>JTBD (Jobs to Be Done)</strong> - теория Клэйтона Кристенсена: люди не покупают продукт, они «нанимают» его на конкретную работу. Формулировка задачи:</p>
      <p style="font-family:'SF Mono',Menlo,monospace;font-size:13px;background:var(--code-bg);padding:8px 12px;border-radius:6px;">«Когда я [ситуация], я хочу [мотивация], чтобы [результат]»</p>
      <p>Для Landed: «Когда я подаюсь на 10+ вакансий в неделю, я хочу видеть, кто ответил и кто молчит, чтобы не терять время на мертвые подачи».</p>
      <p>Метрики JTBD строятся вокруг работы: как быстро продукт ее выполняет (время добавления вакансии - 40 сек против 3 минут вручную), насколько полно (все ли подачи залогированы), как часто работа возникает (каждый день - значит высокая частота и высокая ценность).</p>
      <div class="designer-note">
        На собесе таблицу RICE рисовать не нужно. Достаточно сказать: «У меня было несколько идей, я приоритизировала через RICE - оценила охват, влияние, уверенность и трудозатраты. Начала с X, потому что при меньших усилиях он давал больший охват». JTBD-формулировка хорошо работает в ответе на «какую проблему решает ваш продукт».
      </div>
    `,
    workspace: () => `
      <div class="panel-label"><span>RICE для двух фич + JTBD</span><span class="saved-indicator">сохранено</span></div>
      <div class="panel">
        <div class="sheet-block">
          <label class="sheet-label">JTBD: ситуация / мотивация / результат</label>
          <input class="sheet" id="jtbd_when" placeholder="Когда я подаюсь на 10+ вакансий в неделю..." style="margin-bottom:6px;">
          <input class="sheet" id="jtbd_want" placeholder="...я хочу видеть, кто ответил..." style="margin-bottom:6px;">
          <input class="sheet" id="jtbd_so" placeholder="...чтобы не терять время на мертвые подачи.">
        </div>
        <div class="sheet-block">
          <label class="sheet-label">Фича A: название</label>
          <input class="sheet" id="rice_a_name" placeholder="Авто-лог из почты">
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-top:6px;">
            <input class="sheet" id="rice_a_r" placeholder="Reach" type="number">
            <input class="sheet" id="rice_a_i" placeholder="Impact" type="number" step="0.25">
            <input class="sheet" id="rice_a_c" placeholder="Conf %" type="number">
            <input class="sheet" id="rice_a_e" placeholder="Effort" type="number" step="0.5">
          </div>
        </div>
        <div class="sheet-block">
          <label class="sheet-label">Фича B: название</label>
          <input class="sheet" id="rice_b_name" placeholder="Темная тема">
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-top:6px;">
            <input class="sheet" id="rice_b_r" placeholder="Reach" type="number">
            <input class="sheet" id="rice_b_i" placeholder="Impact" type="number" step="0.25">
            <input class="sheet" id="rice_b_c" placeholder="Conf %" type="number">
            <input class="sheet" id="rice_b_e" placeholder="Effort" type="number" step="0.5">
          </div>
        </div>
        <div class="preview-label">RICE-скоры</div>
        <div class="preview-box" id="rice_preview"><span class="placeholder">Заполните параметры...</span></div>
      </div>
    `,
    init: () => {
      const all = ["jtbd_when","jtbd_want","jtbd_so","rice_a_name","rice_a_r","rice_a_i","rice_a_c","rice_a_e","rice_b_name","rice_b_r","rice_b_i","rice_b_c","rice_b_e"];
      all.forEach(k => bindInput(document.getElementById(k), k));
      const preview = document.getElementById("rice_preview");
      const score = (r, i, c, e) => {
        if (!r || !i || !c || !e) return null;
        return ((r * i * (c / 100)) / e).toFixed(1);
      };
      const update = () => {
        const a = score(parseFloat(work.rice_a_r), parseFloat(work.rice_a_i), parseFloat(work.rice_a_c), parseFloat(work.rice_a_e));
        const b = score(parseFloat(work.rice_b_r), parseFloat(work.rice_b_i), parseFloat(work.rice_b_c), parseFloat(work.rice_b_e));
        const lines = [];
        if (a !== null) lines.push(`<div><strong>${escape(work.rice_a_name) || "Фича A"}:</strong> RICE = ${a}</div>`);
        if (b !== null) lines.push(`<div style="margin-top:6px;"><strong>${escape(work.rice_b_name) || "Фича B"}:</strong> RICE = ${b}</div>`);
        if (a !== null && b !== null) {
          const winner = parseFloat(a) >= parseFloat(b) ? (work.rice_a_name || "Фича A") : (work.rice_b_name || "Фича B");
          lines.push(`<div style="margin-top:10px;color:var(--accent);">По скору ведет: <strong>${escape(winner)}</strong>.</div>`);
        }
        preview.innerHTML = lines.length ? lines.join("") : '<span class="placeholder">Заполните параметры...</span>';
      };
      all.forEach(k => document.getElementById(k).addEventListener("input", update));
      update();
    },
  },

  // 18. WHEN NUMBERS ARE FEW
  {
    title: "Когда чисел мало",
    subtitle: "Что делать, если у вас 12 пользователей и нет аналитики.",
    body: () => `
      <p>Маленькая выборка и отсутствие продакшн-аналитики не означают, что говорить нечего. Сигнал можно нащупать несколькими способами.</p>
      <p><strong>Оценка Ферми</strong> - прикидка на салфетке. Метод физика Энрико Ферми: когда точных данных нет, прикидывают порядок величины через логическую цепочку. Числа честные, логика прозрачная, и на собесе это звучит убедительнее, чем «ну, людям понравилось».</p>
      <p>Пример для Landed: средний дизайнер подает на 10-15 вакансий в неделю, ручной лог одной подачи занимает около 3 минут. 15 × 3 = 45 минут в неделю, ~3 часа в месяц на человека. Если 15 человек пользуются - около 45 часов сэкономленного ручного труда в месяц.</p>
      <p><strong>Proxy-метрики</strong> - когда то, что нужно, нельзя измерить напрямую, берут заместительную метрику, которая с целевой коррелирует. «Удовлетворенность» напрямую не померить, а количество обращений в поддержку (чем меньше, тем лучше) - подходящий proxy. Для Landed: «Я не могла напрямую померить точность AI-парсинга, но замерила, сколько полей пользователь правит после автозаполнения. В среднем 0.8 поля из 6 - proxy для точности около 87%».</p>
      <p><strong>Качественные данные</strong> тоже метрика. Один живой отзыв иногда весит больше, чем процент. Полезно собирать прямые цитаты пользователей (скриншоты, не пересказ), наблюдения за использованием (где застревают), запросы на фичи (что просят чаще).</p>
      <p><strong>Временные метрики</strong>. Время понимают все: не нужно объяснять, почему «3 минуты вместо 15» хорошо. Что мерить: time to value (от регистрации до первого полезного результата), time saved (по сравнению с альтернативой), time on task (сколько занимает действие). Время можно замерить секундомером без аналитики и инструментов.</p>
      <p><strong>Leading vs Lagging.</strong> Запаздывающие метрики (lagging) - то, что уже случилось (NPS за квартал, churn, регистрации за месяц). Опережающие (leading) - ранние сигналы того, что случится дальше (например, добавление 3+ вакансий в первый день предсказывает retention). Для Landed такие пользователи возвращались в 80% случаев, те, кто добавил одну, - в 20%.</p>
      <div class="designer-note">
        Что собрать в питч. Удобная стартовая комбинация: AARRR (хотя бы 2-3 шага с числами) + оценка Ферми (про ценность, когда данных мало) + одна живая цитата. Более продвинутая: NSM + HEART (Task success + Retention) + тест Эллиса. Чего стоит избегать: чисел без вывода («у нас 200 регистраций - и что?»), выдуманных процентов («+200% конверсии на трех пользователях» обычно читается как мем), отсутствия чисел вообще (если нет - поставьте живую цитату).
      </div>
    `,
    workspace: () => `
      <div class="panel-label"><span>Прикидка по Ферми и подбор метрик в питч</span><span class="saved-indicator">сохранено</span></div>
      <div class="panel">
        <div class="sheet-block">
          <label class="sheet-label">Действие, которое замеряем (например: ручной лог одной подачи)</label>
          <input class="sheet" id="fermi_action" placeholder="Ручной лог одной подачи">
        </div>
        <div class="sheet-block">
          <label class="sheet-label">Сколько раз в неделю (на пользователя)</label>
          <input class="sheet" id="fermi_freq" placeholder="15" type="number">
        </div>
        <div class="sheet-block">
          <label class="sheet-label">Минут на одно действие</label>
          <input class="sheet" id="fermi_min" placeholder="3" type="number">
        </div>
        <div class="sheet-block">
          <label class="sheet-label">Активных пользователей</label>
          <input class="sheet" id="fermi_users" placeholder="15" type="number">
        </div>
        <div class="preview-label">Прикидка</div>
        <div class="preview-box" id="fermi_preview"><span class="placeholder">Заполните хотя бы частоту и время...</span></div>
        <div style="margin-top:18px;">
          <div class="panel-label" style="margin-bottom:8px;">Что беру в питч (выберите 2-3)</div>
          <div id="pitch_picks"></div>
        </div>
      </div>
    `,
    init: () => {
      ["fermi_action","fermi_freq","fermi_min","fermi_users"].forEach(k => bindInput(document.getElementById(k), k));
      const preview = document.getElementById("fermi_preview");
      const update = () => {
        const f = parseFloat(work.fermi_freq), m = parseFloat(work.fermi_min), u = parseFloat(work.fermi_users);
        if (!f || !m) {
          preview.innerHTML = '<span class="placeholder">Заполните хотя бы частоту и время...</span>';
          return;
        }
        const minWeek = f * m;
        const lines = [`<div>На одного пользователя: <strong>${minWeek}</strong> минут в неделю (~${(minWeek * 4 / 60).toFixed(1)} часа в месяц).</div>`];
        if (u) {
          const totalHoursMonth = (minWeek * u * 4 / 60).toFixed(0);
          lines.push(`<div style="margin-top:6px;">На ${u} активных - около <strong>${totalHoursMonth}</strong> часов сэкономленного ручного труда в месяц.</div>`);
        }
        preview.innerHTML = lines.join("");
      };
      ["fermi_freq","fermi_min","fermi_users"].forEach(k => document.getElementById(k).addEventListener("input", update));
      update();

      work.pitch_picks = work.pitch_picks || {};
      const picks = [
        ["AARRR (2-3 шага)", "Базовая воронка с числами."],
        ["HEART (Task success + Retention)", "UX-метрики, которые знают PM и дизайнеры."],
        ["NSM + текущая стадия", "Одна главная метрика и фокус."],
        ["Тест Эллиса", "Сильный сигнал даже на 8-10 ответах."],
        ["NPS", "Стандартный показатель, легко сравнивать."],
        ["Оценка Ферми", "Прикидка ценности, когда данных мало."],
        ["RICE для выбора фичи", "Объяснение, как принимали решение."],
        ["JTBD-формулировка", "Ответ на «какую проблему решает продукт»."],
        ["Одна качественная цитата", "Оживляет любые числа."],
        ["Time to value / Time saved", "Время как универсальная единица."],
      ];
      const cont = document.getElementById("pitch_picks");
      cont.innerHTML = picks.map((p, i) => `
        <div class="check-item">
          <input type="checkbox" id="pp${i}" ${work.pitch_picks[i] ? "checked" : ""}>
          <label for="pp${i}">${p[0]}<span class="hint">${p[1]}</span></label>
        </div>
      `).join("");
      cont.querySelectorAll("input").forEach((cb, i) => {
        cb.onchange = () => { work.pitch_picks[i] = cb.checked; save(); };
      });
    },
  },
];

const lessonListEl = document.getElementById("lessonList");
const lessonTextEl = document.getElementById("lessonText");
const workspaceEl = document.getElementById("workspace");
const topTitle = document.getElementById("topTitle");
const progress = document.getElementById("progress");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

let currentIdx = 0;

function buildSidebar() {
  lessonListEl.innerHTML = "";
  lessons.forEach((l, i) => {
    const li = document.createElement("li");
    li.className = "lesson-item" + (i === currentIdx ? " active" : "") + (i < currentIdx ? " done" : "");
    li.innerHTML = `<span class="lesson-num">${String(i + 1).padStart(2, "0")}</span><span>${l.title}</span>`;
    li.onclick = () => loadLesson(i);
    lessonListEl.appendChild(li);
  });
}

function loadLesson(i, keepIndex = false) {
  if (!keepIndex) currentIdx = i;
  const l = lessons[currentIdx];
  topTitle.textContent = l.title;
  progress.textContent = `${currentIdx + 1} / ${lessons.length}`;
  lessonTextEl.innerHTML = `
    <h3>${l.title}</h3>
    ${l.subtitle ? `<p class="subtitle">${l.subtitle}</p>` : ""}
    ${l.body()}
  `;
  workspaceEl.innerHTML = l.workspace();
  if (l.init) l.init();
  buildSidebar();
  prevBtn.disabled = currentIdx === 0;
  nextBtn.disabled = currentIdx === lessons.length - 1;
  if (!keepIndex) {
    try { localStorage.setItem("career_leverage_lesson", currentIdx); } catch {}
  }
}

prevBtn.onclick = () => currentIdx > 0 && loadLesson(currentIdx - 1);
nextBtn.onclick = () => currentIdx < lessons.length - 1 && loadLesson(currentIdx + 1);

document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "TEXTAREA" || e.target.tagName === "INPUT") return;
  if (e.key === "ArrowRight" && !nextBtn.disabled) nextBtn.click();
  if (e.key === "ArrowLeft" && !prevBtn.disabled) prevBtn.click();
});

let saved = 0;
try { saved = parseInt(localStorage.getItem("career_leverage_lesson")) || 0; } catch {}
loadLesson(Math.min(saved, lessons.length - 1));
</script>
</body>
